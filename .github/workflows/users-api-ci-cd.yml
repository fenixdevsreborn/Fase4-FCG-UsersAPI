name: users-api-ci-cd

# Requer no repositório GitHub:
#   Secrets:  AWS_GITHUB_ROLE_ARN, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#             GITOPS_APP_PRIVATE_KEY (chave privada do GitHub App — ver docs/SECURITY-SETUP.md)
#   Variables: GITOPS_REPOSITORY (ex.: org/Fase4-FCG-Orchestrator)
#              GITOPS_APP_ID    (ID numérico do GitHub App)
# Branch alvo: master. Push paralelo para AWS ECR e Docker Hub (<DOCKERHUB_USERNAME>/fcg-users-api).
# Docs: Fase4-FCG-Orchestrator/docs/SECURITY-SETUP.md, docs/MANUAL-STEPS.md

on:
  pull_request:
    paths:
      - "src/**"
      - "UsersAPI.slnx"
      - "Dockerfile"
      - ".github/workflows/users-api-ci-cd.yml"
  push:
    branches: [master]
    paths:
      - "src/**"
      - "UsersAPI.slnx"
      - "Dockerfile"
      - ".github/workflows/users-api-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: users-api
  DOCKERHUB_REPOSITORY: fcg-users-api
  VALUES_REL_PATH: deploy/helm/fcg-platform/values-prod.yaml

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d users_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4.3.0
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore UsersAPI.slnx

      - name: Audit NuGet packages
        run: |
          dotnet list UsersAPI.slnx package --include-transitive --vulnerable | tee nuget-audit.txt
          if grep -E "[[:space:]](High|Critical)[[:space:]]" nuget-audit.txt; then
            echo "High or critical vulnerable packages found."
            exit 1
          fi

      - name: Build
        run: dotnet build UsersAPI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test UsersAPI.slnx --configuration Release --no-build

      - name: Configure AWS credentials
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Login to Amazon ECR
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build and push Docker image to ECR
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" -f Dockerfile .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image to Docker Hub
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        run: |
          DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${DOCKERHUB_REPOSITORY}"
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" "${DOCKERHUB_IMAGE}:latest"
          docker push "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
          docker push "${DOCKERHUB_IMAGE}:latest"

      - name: Scan image with Trivy (SARIF)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master'))
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: trivy-results.sarif

      - name: Gate on Trivy CRITICAL/HIGH
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Generate GitHub App token (GitOps)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        id: app-token
        uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v1.11.3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "Fase4-FCG-Orchestrator"

      - name: Checkout platform repository for GitOps
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ vars.GITOPS_REPOSITORY }}
          path: platform
          token: ${{ steps.app-token.outputs.token }}
          ref: master

      - name: Update GitOps values file
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        env:
          VALUES_REL_PATH: ${{ env.VALUES_REL_PATH }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path("platform") / os.environ["VALUES_REL_PATH"]
          text = path.read_text()
          pattern = re.compile(
              r"(users-api:\s*\n(?:[^\n]*\n)*?\s*repository:\s*)([^\n]+)(\n\s*tag:\s*)([^\n]+)",
              re.MULTILINE,
          )
          new_text, count = pattern.subn(
              rf"\g<1>{os.environ['ECR_REGISTRY']}/{os.environ['ECR_REPOSITORY']}\g<3>\"{os.environ['IMAGE_TAG']}\"",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("users-api block not found in values-prod.yaml")
          path.write_text(new_text)
          PY

      - name: Commit and push GitOps change
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        working-directory: platform
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.VALUES_REL_PATH }}"
          git diff --cached --quiet && exit 0
          git commit -m "ci: deploy users-api ${IMAGE_TAG}"
          git push
