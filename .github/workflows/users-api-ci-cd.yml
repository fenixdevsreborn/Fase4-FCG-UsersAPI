name: users-api-ci-cd

# Requer no repositório GitHub: secret AWS_GITHUB_ROLE_ARN; secret GITOPS_TOKEN; variable GITOPS_REPOSITORY (ex.: org/Fase2-Orchestrator)

on:
  pull_request:
    paths:
      - "src/**"
      - "UsersAPI.slnx"
      - "Dockerfile"
      - ".github/workflows/users-api-ci-cd.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "UsersAPI.slnx"
      - "Dockerfile"
      - ".github/workflows/users-api-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: users-api
  VALUES_REL_PATH: deploy/helm/fcg-platform/values-prod.yaml

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d users_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UsersAPI.slnx

      - name: Audit NuGet packages
        run: |
          dotnet list UsersAPI.slnx package --include-transitive --vulnerable | tee nuget-audit.txt
          if grep -E "[[:space:]](High|Critical)[[:space:]]" nuget-audit.txt; then
            echo "High or critical vulnerable packages found."
            exit 1
          fi

      - name: Build
        run: dotnet build UsersAPI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test UsersAPI.slnx --configuration Release --no-build

      - name: Configure AWS credentials
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}

      - name: Login to Amazon ECR
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" -f Dockerfile .
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"

      - name: Scan image with Trivy
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Checkout platform repository for GitOps
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPOSITORY }}
          path: platform
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Update GitOps values file
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          VALUES_REL_PATH: ${{ env.VALUES_REL_PATH }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path("platform") / os.environ["VALUES_REL_PATH"]
          text = path.read_text()
          pattern = re.compile(
              r"(users-api:\s*\n(?:[^\n]*\n)*?\s*repository:\s*)([^\n]+)(\n\s*tag:\s*)([^\n]+)",
              re.MULTILINE,
          )
          new_text, count = pattern.subn(
              rf"\g<1>{os.environ['ECR_REGISTRY']}/{os.environ['ECR_REPOSITORY']}\g<3>\"{os.environ['IMAGE_TAG']}\"",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("users-api block not found in values-prod.yaml")
          path.write_text(new_text)
          PY

      - name: Commit and push GitOps change
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        working-directory: platform
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.VALUES_REL_PATH }}"
          git diff --cached --quiet && exit 0
          git commit -m "ci: deploy users-api ${IMAGE_TAG}"
          git push
